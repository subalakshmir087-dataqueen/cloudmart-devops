apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: staging-orders-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/subalakshmir087-dataqueen/cloudmart-devops.git
    targetRevision: main
    path: helm/orders-api
    helm:
      valueFiles:
        - values-staging.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
